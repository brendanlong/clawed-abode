minimumReleaseAge: 10080
minimumReleaseAgeIgnoreMissingTime: false
minimumReleaseAgeExclude:
  - '@anthropic-ai/*'
  # Pinned, security-relevant input sanitizer; new releases ship faster than the
  # 7-day quarantine. Pinned to an exact version below so an excluded auto-bump
  # can't slip in silently.
  - 'agent-input-sanitizer'

packages:
  - '.'

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - bcrypt
  - better-sqlite3
  - cpu-features
  - prisma
  - protobufjs
  - ssh2
  - unrs-resolver
